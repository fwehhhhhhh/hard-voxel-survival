<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HardVoxel Mobile</title>
  <style>
    body { margin:0; overflow:hidden; background:#000; font-family:Arial; touch-action:none; }
    canvas { display:block; }
    #ui { position:absolute; top:10px; left:10px; color:white; z-index:10; pointer-events:none; font-size:14px; }
    #crosshair { position:absolute; top:50%; left:50%; font-size:40px; transform:translate(-50%,-50%); color:rgba(255,255,255,0.8); z-index:10; pointer-events:none; }
    #controls { position:absolute; bottom:20px; left:20px; width:110px; height:110px; background:rgba(255,255,255,0.15); border:3px solid rgba(255,255,255,0.6); border-radius:50%; z-index:30; touch-action:none; }
    #jump { position:absolute; bottom:40px; right:40px; width:80px; height:80px; background:rgba(255,255,255,0.25); border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:16px; font-weight:bold; z-index:30; }
  </style>
</head>
<body>
  <div id="ui">Health: <span id="health">100</span> | Hunger: <span id="hunger">100</span></div>
  <div id="crosshair">+</div>
  <div id="controls"></div>
  <div id="jump">JUMP</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/4.0.1/simplex-noise.min.js"></script>

  <script>
    const CHUNK_SIZE = 12;
    const RENDER_DISTANCE = 2; // very small for mobile
    let scene, camera, renderer, player;
    let velocity = new THREE.Vector3();
    let keys = {};
    let yaw = 0, pitch = 0;
    let lastTime = Date.now();
    let health = 100, hunger = 100;

    function init() {
      scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x88aaff, 20, 80);

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
      renderer = new THREE.WebGLRenderer({ antialias: false });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      // Lights
      scene.add(new THREE.AmbientLight(0xffffff, 0.7));
      const sun = new THREE.DirectionalLight(0xffffff, 0.8);
      sun.position.set(30, 50, 20);
      scene.add(sun);

      // Player
      player = new THREE.Object3D();
      player.position.set(6, 15, 6);
      camera.position.set(0, 1.6, 0);
      player.add(camera);
      scene.add(player);

      // Test cube to make sure rendering works
      const test = new THREE.Mesh(
        new THREE.BoxGeometry(3,3,3),
        new THREE.MeshLambertMaterial({color: 0xff0000})
      );
      test.position.set(6, 10, 6);
      scene.add(test);

      setupControls();
      generateSmallWorld();
      animate();
    }

    function createBlock(x, y, z, color) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(1,1,1),
        new THREE.MeshLambertMaterial({color})
      );
      mesh.position.set(x, y, z);
      scene.add(mesh);
      return mesh;
    }

    function generateSmallWorld() {
      // Flat ground + some hills
      for (let x = 0; x < 25; x++) {
        for (let z = 0; z < 25; z++) {
          const height = Math.floor(Math.random() * 4) + 4;
          for (let y = 0; y < height; y++) {
            let color = (y === height-1) ? 0x00aa00 : 0x8B4513;
            createBlock(x, y, z, color);
          }
        }
      }
    }

    function setupControls() {
      // Keyboard (desktop)
      document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
      document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

      // Mouse look (desktop)
      const canvas = renderer.domElement;
      canvas.addEventListener('click', () => canvas.requestPointerLock());
      document.addEventListener('mousemove', e => {
        if (document.pointerLockElement) {
          yaw -= e.movementX * 0.002;
          pitch -= e.movementY * 0.002;
          pitch = Math.max(-1.5, Math.min(1.5, pitch));
          camera.rotation.set(pitch, yaw, 0);
        }
      });

      // Mobile touch look
      let lastTouchX = 0, lastTouchY = 0;
      canvas.addEventListener('touchstart', e => {
        if (e.touches.length === 1) {
          lastTouchX = e.touches[0].clientX;
          lastTouchY = e.touches[0].clientY;
        }
      });
      canvas.addEventListener('touchmove', e => {
        if (e.touches.length === 1) {
          const dx = e.touches[0].clientX - lastTouchX;
          const dy = e.touches[0].clientY - lastTouchY;
          yaw -= dx * 0.006;
          pitch -= dy * 0.006;
          pitch = Math.max(-1.5, Math.min(1.5, pitch));
          camera.rotation.set(pitch, yaw, 0);
          lastTouchX = e.touches[0].clientX;
          lastTouchY = e.touches[0].clientY;
        }
      });

      // Jump button
      document.getElementById('jump').addEventListener('touchstart', () => {
        if (player.position.y < 8) velocity.y = 10;
      });
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = (Date.now() - lastTime) / 1000 || 0.016;
      lastTime = Date.now();

      // Movement
      const speed = 8 * dt;
      const dir = new THREE.Vector3();
      if (keys['w'] || keys['arrowup']) dir.z -= 1;
      if (keys['s'] || keys['arrowdown']) dir.z += 1;
      if (keys['a'] || keys['arrowleft']) dir.x -= 1;
      if (keys['d'] || keys['arrowright']) dir.x += 1;
      dir.normalize().applyQuaternion(camera.quaternion);
      player.position.x += dir.x * speed;
      player.position.z += dir.z * speed;

      // Gravity
      velocity.y -= 25 * dt;
      player.position.y += velocity.y * dt;
      if (player.position.y < 6) {
        player.position.y = 6;
        velocity.y = 0;
      }

      // Stats
      hunger = Math.max(0, hunger - 4 * dt);
      document.getElementById('health').textContent = Math.floor(health);
      document.getElementById('hunger').textContent = Math.floor(hunger);

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
  </script>
</body>
</html>
