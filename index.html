<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#000000">

  <title>HardVoxel Survival</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://via.placeholder.com/180x180/000/fff?text=HV">

  <style>
    body { margin:0; overflow:hidden; background:#000; font-family:Arial; touch-action:none; }
    canvas { display:block; }
    #ui { position:absolute; top:10px; left:10px; color:white; z-index:10; pointer-events:none; font-size:14px; }
    #crosshair { position:absolute; top:50%; left:50%; font-size:40px; transform:translate(-50%,-50%); color:rgba(255,255,255,0.8); z-index:10; pointer-events:none; }
    
    #joystickContainer { 
      position:absolute; bottom:30px; left:30px; width:130px; height:130px; 
      background:rgba(255,255,255,0.15); border:4px solid rgba(255,255,255,0.5); 
      border-radius:50%; z-index:30; touch-action:none; 
    }
    #joystickKnob { 
      position:absolute; top:50%; left:50%; width:50px; height:50px; 
      background:rgba(255,255,255,0.6); border-radius:50%; 
      transform:translate(-50%, -50%); z-index:31; 
    }
    #jump { 
      position:absolute; bottom:50px; right:40px; width:80px; height:80px; 
      background:rgba(255,255,255,0.25); border-radius:50%; display:flex; 
      align-items:center; justify-content:center; color:white; font-size:18px; 
      font-weight:bold; z-index:30; 
    }
  </style>
</head>
<body>
  <div id="ui">Health: <span id="health">100</span> | Hunger: <span id="hunger">100</span></div>
  <div id="crosshair">+</div>
  
  <div id="joystickContainer">
    <div id="joystickKnob"></div>
  </div>
  <div id="jump">JUMP</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/4.0.1/simplex-noise.min.js"></script>

  <script>
    const CHUNK_SIZE = 16;
    const RENDER_DISTANCE = 3; // increase if your phone can handle it
    let scene, camera, renderer, player;
    let velocity = new THREE.Vector3();
    let yaw = 0, pitch = 0;
    let lastTime = Date.now();
    let health = 100, hunger = 100;
    let moveDir = { x: 0, z: 0 };
    let chunks = new Map();
    let selectedBlock = 1; // 1=grass, 2=dirt, 3=stone
    const simplex = new SimplexNoise();

    const BLOCK_COLORS = {
      1: 0x22aa22, // grass
      2: 0x8B5A2B, // dirt
      3: 0x888888  // stone
    };

    function init() {
      scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x88aaff, 40, 120);

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
      renderer = new THREE.WebGLRenderer({ antialias: false });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      scene.add(new THREE.AmbientLight(0xffffff, 0.7));
      const sun = new THREE.DirectionalLight(0xffffff, 0.9);
      sun.position.set(50, 80, 30);
      scene.add(sun);

      player = new THREE.Object3D();
      player.position.set(8, 20, 8);
      camera.position.set(0, 1.6, 0);
      player.add(camera);
      scene.add(player);

      generateInitialWorld();
      setupControls();
      animate();
    }

    function getHeight(x, z) {
      return Math.floor(simplex.noise2D(x * 0.03, z * 0.03) * 6 + 8);
    }

    function createBlockMesh(x, y, z, type) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(1, 1, 1),
        new THREE.MeshLambertMaterial({ color: BLOCK_COLORS[type] || 0xaaaaaa })
      );
      mesh.position.set(x, y, z);
      mesh.userData.type = type;
      return mesh;
    }

    function generateChunk(cx, cz) {
      const key = `${cx},${cz}`;
      if (chunks.has(key)) return;
      const chunk = new THREE.Group();

      for (let x = 0; x < CHUNK_SIZE; x++) {
        for (let z = 0; z < CHUNK_SIZE; z++) {
          const wx = cx * CHUNK_SIZE + x;
          const wz = cz * CHUNK_SIZE + z;
          const height = getHeight(wx, wz);

          for (let y = 0; y < height; y++) {
            let type = 3; // stone
            if (y === height - 1) type = 1; // grass
            else if (y > height - 4) type = 2; // dirt
            const block = createBlockMesh(wx, y, wz, type);
            chunk.add(block);
          }
        }
      }
      scene.add(chunk);
      chunks.set(key, chunk);
    }

    function generateInitialWorld() {
      const startX = Math.floor(player.position.x / CHUNK_SIZE);
      const startZ = Math.floor(player.position.z / CHUNK_SIZE);
      for (let dx = -RENDER_DISTANCE; dx <= RENDER_DISTANCE; dx++) {
        for (let dz = -RENDER_DISTANCE; dz <= RENDER_DISTANCE; dz++) {
          generateChunk(startX + dx, startZ + dz);
        }
      }
    }

    function updateChunks() {
      const cx = Math.floor(player.position.x / CHUNK_SIZE);
      const cz = Math.floor(player.position.z / CHUNK_SIZE);
      for (let dx = -RENDER_DISTANCE; dx <= RENDER_DISTANCE; dx++) {
        for (let dz = -RENDER_DISTANCE; dz <= RENDER_DISTANCE; dz++) {
          generateChunk(cx + dx, cz + dz);
        }
      }
      // Simple cleanup of far chunks
      for (let [key, chunk] of chunks) {
        const [kx, kz] = key.split(',').map(Number);
        if (Math.abs(kx - cx) > RENDER_DISTANCE + 1 || Math.abs(kz - cz) > RENDER_DISTANCE + 1) {
          scene.remove(chunk);
          chunks.delete(key);
        }
      }
    }

    function raycastBlock(remove) {
      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
      const intersects = raycaster.intersectObjects(scene.children, true);
      if (intersects.length > 0) {
        const intersect = intersects[0];
        let pos = intersect.point.clone();
        if (!remove) pos.add(intersect.face.normal.multiplyScalar(0.6));

        const bx = Math.floor(pos.x);
        const by = Math.floor(pos.y);
        const bz = Math.floor(pos.z);

        if (remove) {
          // Remove block
          scene.children.forEach(child => {
            if (child.position && Math.abs(child.position.x - bx) < 0.1 &&
                Math.abs(child.position.y - by) < 0.1 &&
                Math.abs(child.position.z - bz) < 0.1) {
              scene.remove(child);
            }
          });
        } else {
          // Place block
          const block = createBlockMesh(bx, by, bz, selectedBlock);
          scene.add(block);
        }
      }
    }

    function setupControls() {
      // Joystick (same as before)
      const container = document.getElementById('joystickContainer');
      const knob = document.getElementById('joystickKnob');
      let joystickActive = false;
      let centerX, centerY;

      container.addEventListener('touchstart', e => {
        joystickActive = true;
        const rect = container.getBoundingClientRect();
        centerX = rect.left + rect.width / 2;
        centerY = rect.top + rect.height / 2;
        updateKnob(e.touches[0]);
      });

      document.addEventListener('touchmove', e => {
        if (joystickActive) updateKnob(e.touches[0]);
      });

      document.addEventListener('touchend', () => {
        if (joystickActive) {
          joystickActive = false;
          knob.style.transform = 'translate(-50%, -50%)';
          moveDir = { x: 0, z: 0 };
        }
      });

      function updateKnob(touch) {
        let dx = touch.clientX - centerX;
        let dy = touch.clientY - centerY;
        const dist = Math.min(45, Math.hypot(dx, dy));
        const angle = Math.atan2(dy, dx);
        dx = Math.cos(angle) * dist;
        dy = Math.sin(angle) * dist;
        knob.style.transform = `translate(${dx-25}px, ${dy-25}px)`;
        moveDir.x = dx / 45;
        moveDir.z = dy / 45;
      }

      // Touch look (right side)
      const canvas = renderer.domElement;
      let lastX = 0, lastY = 0;
      canvas.addEventListener('touchstart', e => {
        if (e.touches.length === 1 && e.touches[0].clientX > window.innerWidth * 0.45) {
          lastX = e.touches[0].clientX;
          lastY = e.touches[0].clientY;
        }
      });
      canvas.addEventListener('touchmove', e => {
        if (e.touches.length === 1 && e.touches[0].clientX > window.innerWidth * 0.45) {
          const dx = e.touches[0].clientX - lastX;
          const dy = e.touches[0].clientY - lastY;
          yaw -= dx * 0.008;
          pitch -= dy * 0.008;
          pitch = Math.max(-1.4, Math.min(1.4, pitch));
          camera.rotation.set(pitch, yaw, 0);
          lastX = e.touches[0].clientX;
          lastY = e.touches[0].clientY;
        }
      });

      // Break / Place
      canvas.addEventListener('touchend', e => {
        if (e.changedTouches[0].clientX > window.innerWidth * 0.45) {
          raycastBlock(true); // tap right side = break
        } else {
          raycastBlock(false); // tap left side = place
        }
      });

      // Jump
      document.getElementById('jump').addEventListener('touchstart', () => {
        if (player.position.y < 8) velocity.y = 11;
      });
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = (Date.now() - lastTime) / 1000 || 0.016;
      lastTime = Date.now();

      // Movement
      const speed = 9 * dt;
      const forward = new THREE.Vector3(0, 0, moveDir.z).applyQuaternion(camera.quaternion);
      const strafe = new THREE.Vector3(moveDir.x, 0, 0).applyQuaternion(camera.quaternion);
      player.position.x += (forward.x + strafe.x) * speed;
      player.position.z += (forward.z + strafe.z) * speed;

      // Gravity
      velocity.y -= 28 * dt;
      player.position.y += velocity.y * dt;
      if (player.position.y < 6) {
        player.position.y = 6;
        velocity.y = 0;
      }

      // Very slow hunger
      hunger = Math.max(0, hunger - 0.8 * dt);
      document.getElementById('health').textContent = Math.floor(health);
      document.getElementById('hunger').textContent = Math.floor(hunger);

      updateChunks();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

    init();
  </script>
</body>
</html>
