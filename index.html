<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HardVoxel Survival</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: Arial; touch-action: none; }
    canvas { display: block; }
    #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; z-index: 10; }
    #crosshair { position: absolute; top: 50%; left: 50%; font-size: 30px; transform: translate(-50%, -50%); color: white; pointer-events: none; z-index: 10; }
    #inventory { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 10; }
    .slot { width: 50px; height: 50px; background: rgba(255,255,255,0.2); border: 2px solid white; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; cursor: pointer; }
    #crafting { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 10px; border: 2px solid white; display: none; z-index: 10; }
    .mob { color: red; font-size: 20px; position: absolute; pointer-events: none; }
    /* Mobile controls */
    #joystick { position: absolute; bottom: 30px; left: 30px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; border: 3px solid white; display: none; z-index: 20; }
    #jumpBtn { position: absolute; bottom: 50px; right: 30px; width: 80px; height: 80px; background: rgba(255,255,255,0.3); border-radius: 50%; display: none; align-items: center; justify-content: center; color: white; font-size: 14px; z-index: 20; }
  </style>
</head>
<body>
  <div id="ui">
    <div>Health: <span id="health">100</span> | Hunger: <span id="hunger">100</span> | Day: <span id="day">1</span></div>
    <div>Left click/tap: Break | Right click: Place | Space: Jump</div>
  </div>
  <div id="crosshair">+</div>
  <div id="inventory"></div>
  <div id="crafting">
    <button onclick="craft('plank')">Craft Planks (from Wood)</button>
  </div>

  <!-- Mobile controls -->
  <div id="joystick"></div>
  <div id="jumpBtn">JUMP</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/4.0.1/simplex-noise.min.js"></script>
  <script>
    // === CONFIG ===
    const WORLD_SIZE = 5; // smaller for mobile perf, increase later
    const CHUNK_SIZE = 16;
    const RENDER_DISTANCE = 4;
    const BLOCK_TYPES = { AIR: 0, GRASS: 1, DIRT: 2, STONE: 3, WOOD: 4, PLANKS: 5 };
    let scene, camera, renderer, player, velocity = new THREE.Vector3();
    let chunks = new Map();
    let modifiedBlocks = new Map(); // key: "x,y,z" value: type or null (removed)
    let selectedBlock = BLOCK_TYPES.GRASS;
    let health = 100, hunger = 100, day = 1;
    let isNight = false;
    let mobs = [];
    const simplex = new SimplexNoise();
    let keys = {};
    let yaw = 0, pitch = 0;
    let lastTime = Date.now();

    // === INIT ===
    function init() {
      scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x88ccff, 30, 120);

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const ambient = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambient);
      const sun = new THREE.DirectionalLight(0xffffff, 1);
      sun.position.set(50, 100, 50);
      scene.add(sun);

      player = new THREE.Object3D();
      player.position.set(8, 25, 8);
      camera.position.set(0, 1.6, 0);
      player.add(camera);
      scene.add(player);

      setupControls();
      loadGame();
      generateWorld();
      createInventoryUI();
      setupMobileControls();
      animate();
    }

    function getBlockKey(x, y, z) {
      return `${Math.floor(x)},${Math.floor(y)},${Math.floor(z)}`;
    }

    // === TERRAIN ===
    function getHeight(x, z) {
      let h = Math.floor(simplex.noise2D(x * 0.03, z * 0.03) * 10 + 12);
      h += Math.floor(simplex.noise2D(x * 0.08, z * 0.08) * 5);
      return Math.max(4, h);
    }

    function createBlockMesh(type) {
      let color = 0x00ff00;
      if (type === BLOCK_TYPES.DIRT) color = 0x8B4513;
      if (type === BLOCK_TYPES.STONE) color = 0x808080;
      if (type === BLOCK_TYPES.WOOD) color = 0xA0522D;
      if (type === BLOCK_TYPES.PLANKS) color = 0xDEB887;
      const geo = new THREE.BoxGeometry(1, 1, 1);
      const mat = new THREE.MeshLambertMaterial({ color });
      return new THREE.Mesh(geo, mat);
    }

    function generateChunk(cx, cz) {
      const key = `${cx},${cz}`;
      if (chunks.has(key)) return;
      const chunk = new THREE.Group();

      for (let x = 0; x < CHUNK_SIZE; x++) {
        for (let z = 0; z < CHUNK_SIZE; z++) {
          const wx = cx * CHUNK_SIZE + x;
          const wz = cz * CHUNK_SIZE + z;
          const height = getHeight(wx, wz);

          for (let y = 0; y < height; y++) {
            let type = BLOCK_TYPES.STONE;
            if (y === height - 1) type = BLOCK_TYPES.GRASS;
            else if (y > height - 4) type = BLOCK_TYPES.DIRT;

            const bkey = getBlockKey(wx, y, wz);
            if (modifiedBlocks.has(bkey)) {
              const mod = modifiedBlocks.get(bkey);
              if (mod === null) continue;
              type = mod;
            }

            const mesh = createBlockMesh(type);
            mesh.position.set(wx, y, wz);
            chunk.add(mesh);
          }

          // Trees & hazards
          if (Math.random() < 0.04 && height > 9) {
            for (let ty = 0; ty < 6; ty++) {
              const tree = createBlockMesh(BLOCK_TYPES.WOOD);
              tree.position.set(wx, height + ty, wz);
              chunk.add(tree);
            }
          }
        }
      }
      scene.add(chunk);
      chunks.set(key, chunk);
    }

    function unloadFarChunks() {
      const px = Math.floor(player.position.x / CHUNK_SIZE);
      const pz = Math.floor(player.position.z / CHUNK_SIZE);
      for (let [key, chunk] of chunks) {
        const [cx, cz] = key.split(',').map(Number);
        if (Math.abs(cx - px) > RENDER_DISTANCE || Math.abs(cz - pz) > RENDER_DISTANCE) {
          scene.remove(chunk);
          chunks.delete(key);
        }
      }
    }

    function generateWorld() {
      const px = Math.floor(player.position.x / CHUNK_SIZE);
      const pz = Math.floor(player.position.z / CHUNK_SIZE);
      for (let dx = -RENDER_DISTANCE; dx <= RENDER_DISTANCE; dx++) {
        for (let dz = -RENDER_DISTANCE; dz <= RENDER_DISTANCE; dz++) {
          generateChunk(px + dx, pz + dz);
        }
      }
    }

    // === MOBS ===
    function spawnMob() {
      const mob = createBlockMesh(0); // placeholder
      mob.material.color.set(0xff0000);
      mob.scale.set(0.8, 1.8, 0.8);
      mob.position.set(
        player.position.x + (Math.random() - 0.5) * 30,
        30,
        player.position.z + (Math.random() - 0.5) * 30
      );
      scene.add(mob);
      mobs.push(mob);
    }

    function updateMobs(dt) {
      for (let i = mobs.length - 1; i >= 0; i--) {
        const m = mobs[i];
        const dir = new THREE.Vector3().subVectors(player.position, m.position).normalize();
        m.position.x += dir.x * 3 * dt;
        m.position.z += dir.z * 3 * dt;
        m.position.y = Math.max(5, m.position.y - 15 * dt); // fall

        // damage player
        if (m.position.distanceTo(player.position) < 2) {
          health -= 25 * dt;
          scene.remove(m);
          mobs.splice(i, 1);
        }
      }
    }

    // === BLOCK INTERACTION ===
    function raycastBlock(remove) {
      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
      const intersects = raycaster.intersectObjects(scene.children, true);
      if (intersects.length > 0) {
        const intersect = intersects[0];
        const pos = intersect.point.clone();
        if (!remove) pos.add(intersect.face.normal.multiplyScalar(0.6));

        const bx = Math.floor(pos.x + 0.5);
        const by = Math.floor(pos.y + 0.5);
        const bz = Math.floor(pos.z + 0.5);

        const bkey = getBlockKey(bx, by, bz);

        if (remove) {
          modifiedBlocks.set(bkey, null);
          // remove visual mesh (simplified - in real would search and remove)
          scene.children.forEach(child => {
            if (child.position && Math.abs(child.position.x - bx) < 0.6 &&
                Math.abs(child.position.y - by) < 0.6 &&
                Math.abs(child.position.z - bz) < 0.6) {
              scene.remove(child);
            }
          });
        } else {
          const newBlock = createBlockMesh(selectedBlock);
          newBlock.position.set(bx, by, bz);
          scene.add(newBlock);
          modifiedBlocks.set(bkey, selectedBlock);
        }
      }
    }

    // === INVENTORY & CRAFTING ===
    function createInventoryUI() {
      const inv = document.getElementById('inventory');
      inv.innerHTML = '';
      [BLOCK_TYPES.GRASS, BLOCK_TYPES.DIRT, BLOCK_TYPES.STONE, BLOCK_TYPES.WOOD, BLOCK_TYPES.PLANKS].forEach(t => {
        const slot = document.createElement('div');
        slot.className = 'slot';
        slot.textContent = Object.keys(BLOCK_TYPES).find(k => BLOCK_TYPES[k] === t)[0];
        slot.onclick = () => selectedBlock = t;
        inv.appendChild(slot);
      });
    }

    window.craft = function(item) {
      if (item === 'plank' && Math.random() < 0.7) { // simple chance
        selectedBlock = BLOCK_TYPES.PLANKS;
        alert("Crafted Planks!");
      }
    };

    // === CONTROLS ===
    function setupControls() {
      document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
      document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

      document.addEventListener('mousemove', e => {
        if (document.pointerLockElement) {
          yaw -= e.movementX * 0.002;
          pitch -= e.movementY * 0.002;
          pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
          camera.rotation.set(pitch, yaw, 0);
        }
      });

      const canvas = renderer.domElement;
      canvas.addEventListener('click', () => canvas.requestPointerLock());
      canvas.addEventListener('mousedown', e => {
        if (document.pointerLockElement) {
          if (e.button === 0) raycastBlock(true);
          if (e.button === 2) raycastBlock(false);
        }
      });

      document.addEventListener('contextmenu', e => e.preventDefault());
    }

    // === MOBILE CONTROLS ===
    function setupMobileControls() {
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      if (!isMobile) return;

      document.getElementById('joystick').style.display = 'block';
      document.getElementById('jumpBtn').style.display = 'flex';

      // basic touch movement - expand with nipplejs if wanted
      let touchId = null;
      const joy = document.getElementById('joystick');
      joy.addEventListener('touchstart', e => {
        if (touchId === null) touchId = e.changedTouches[0].identifier;
      });
      document.addEventListener('touchmove', e => {
        for (let t of e.changedTouches) {
          if (t.identifier === touchId) {
            // simple forward movement on drag (improve as needed)
            keys['w'] = true;
            setTimeout(() => keys['w'] = false, 100);
          }
        }
      });
      joy.addEventListener('touchend', () => { touchId = null; keys['w'] = false; });

      document.getElementById('jumpBtn').addEventListener('touchstart', () => {
        if (player.position.y < 6) velocity.y = 9;
      });
    }

    // === PHYSICS & GAME LOOP ===
    function animate() {
      requestAnimationFrame(animate);
      const dt = (Date.now() - lastTime) / 1000 || 0.016;
      lastTime = Date.now();

      // Movement
      const speed = 12 * dt;
      const dir = new THREE.Vector3();
      if (keys['w']) dir.z -= 1;
      if (keys['s']) dir.z += 1;
      if (keys['a']) dir.x -= 1;
      if (keys['d']) dir.x += 1;
      dir.normalize().applyQuaternion(camera.quaternion);
      player.position.x += dir.x * speed;
      player.position.z += dir.z * speed;

      // Gravity + jump
      velocity.y -= 28 * dt;
      player.position.y += velocity.y * dt;
      if (player.position.y < 5) {
        player.position.y = 5;
        velocity.y = keys[' '] ? 10 : 0;
      }

      // Hunger & health
      hunger = Math.max(0, hunger - 3 * dt);
      if (hunger < 10) health = Math.max(0, health - 12 * dt);
      document.getElementById('health').textContent = Math.floor(health);
      document.getElementById('hunger').textContent = Math.floor(hunger);

      // Day/night
      const cycle = Math.sin(Date.now() / 8000);
      isNight = cycle < -0.4;
      scene.fog.color.set(isNight ? 0x112233 : 0x88ccff);
      if (isNight && Math.random() < 0.008) spawnMob();

      updateMobs(dt);

      // Chunk management
      unloadFarChunks();
      generateWorld();

      // Win/lose
      if (health <= 0) {
        alert("You died in the harsh wilderness! Refresh to try again.");
        health = 100;
      }

      renderer.render(scene, camera);
    }

    // === SAVE / LOAD ===
    function saveGame() {
      const saveData = {
        playerPos: player.position.toArray(),
        health, hunger, day,
        modifiedBlocks: Object.fromEntries(modifiedBlocks)
      };
      localStorage.setItem('hardvoxel_save', JSON.stringify(saveData));
    }

    function loadGame() {
      const saved = localStorage.getItem('hardvoxel_save');
      if (!saved) return;
      const data = JSON.parse(saved);
      player.position.fromArray(data.playerPos || [8,25,8]);
      health = data.health || 100;
      hunger = data.hunger || 100;
      day = data.day || 1;
      modifiedBlocks = new Map(Object.entries(data.modifiedBlocks || {}));
    }

    // Auto save every 15s
    setInterval(saveGame, 15000);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Touch support for breaking/placing on mobile
    let lastTap = 0;
    renderer.domElement.addEventListener('touchend', e => {
      const now = Date.now();
      if (now - lastTap < 300) {
        raycastBlock(true); // double tap = break
      } else {
        raycastBlock(false); // single = place
      }
      lastTap = now;
    });

    init();
  </script>
</body>
</html>
