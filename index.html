<script>
  const CHUNK_SIZE = 16;
  const RENDER_DISTANCE = 2;
  let scene, camera, renderer, player;
  let velocity = new THREE.Vector3();
  let yaw = 0, pitch = 0;
  let lastTime = Date.now();
  let health = 100, hunger = 100;
  let moveDir = { x: 0, z: 0 };
  let chunks = new Map();
  let selectedBlock = 1;
  const simplex = new SimplexNoise();
  
  // NEW: Track loading state
  let loadingQueue = new Set();
  let isLoading = false;

  const BLOCK_COLORS = { 1: 0x22aa22, 2: 0x8B5A2B, 3: 0x888888 };

  function init() {
    // ... (keep your existing init code until loadChunksGradually() call)
    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x88aaff, 35, 90);

    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 150);
    renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.65));
    const sun = new THREE.DirectionalLight(0xffffff, 0.9);
    sun.position.set(40, 70, 30);
    scene.add(sun);

    player = new THREE.Object3D();
    player.position.set(8, 18, 8);
    camera.position.set(0, 1.6, 0);
    player.add(camera);
    scene.add(player);

    // Start loading chunks
    loadChunksGradually();
    setupControls();
    animate();
  }

  function getHeight(x, z) {
    return Math.floor(simplex.noise2D(x * 0.04, z * 0.04) * 7 + 9);
  }

  function createBlockMesh(x, y, z, type) {
    const mesh = new THREE.Mesh(
      new THREE.BoxGeometry(1, 1, 1),
      new THREE.MeshLambertMaterial({ color: BLOCK_COLORS[type] })
    );
    mesh.position.set(x, y, z);
    return mesh;
  }

  function generateChunk(cx, cz) {
    const key = `${cx},${cz}`;
    if (chunks.has(key)) return;
    
    const chunk = new THREE.Group();
    for (let x = 0; x < CHUNK_SIZE; x++) {
      for (let z = 0; z < CHUNK_SIZE; z++) {
        const wx = cx * CHUNK_SIZE + x;
        const wz = cz * CHUNK_SIZE + z;
        const height = getHeight(wx, wz);
        for (let y = 0; y < height; y++) {
          let type = (y === height-1) ? 1 : (y > height-4 ? 2 : 3);
          chunk.add(createBlockMesh(wx, y, wz, type));
        }
      }
    }
    scene.add(chunk);
    chunks.set(key, chunk);
  }

  // FIXED: Proper chunk loading with queue management
  function loadChunksGradually() {
    const cx = Math.floor(player.position.x / CHUNK_SIZE);
    const cz = Math.floor(player.position.z / CHUNK_SIZE);
    
    // Clear old queue entries that are no longer needed
    const newQueue = new Set();
    for (let dx = -RENDER_DISTANCE; dx <= RENDER_DISTANCE; dx++) {
      for (let dz = -RENDER_DISTANCE; dz <= RENDER_DISTANCE; dz++) {
        const key = `${cx + dx},${cz + dz}`;
        if (!chunks.has(key)) {
          newQueue.add(key);
        }
      }
    }
    loadingQueue = newQueue;
    
    // Start processing if not already
    if (!isLoading) processQueue();
  }

  function processQueue() {
    if (loadingQueue.size === 0) {
      isLoading = false;
      return;
    }
    isLoading = true;
    
    // Take one chunk from queue
    const iterator = loadingQueue.values();
    const next = iterator.next();
    if (!next.done) {
      const key = next.value;
      loadingQueue.delete(key);
      const [cx, cz] = key.split(',').map(Number);
      generateChunk(cx, cz);
    }
    
    // Schedule next chunk with a small delay
    setTimeout(processQueue, 10);
  }

  function updateChunks() {
    const cx = Math.floor(player.position.x / CHUNK_SIZE);
    const cz = Math.floor(player.position.z / CHUNK_SIZE);
    
    // Unload far chunks FIRST
    for (let [key, chunk] of chunks.entries()) {
      const [kx, kz] = key.split(',').map(Number);
      if (Math.abs(kx - cx) > RENDER_DISTANCE + 1 || Math.abs(kz - cz) > RENDER_DISTANCE + 1) {
        scene.remove(chunk);
        // Clean up geometries/materials to prevent memory leaks
        chunk.children.forEach(child => {
          if (child.geometry) child.geometry.dispose();
          if (child.material) child.material.dispose();
        });
        chunks.delete(key);
      }
    }
    
    // Then load new chunks
    loadChunksGradually();
  }

  // ... (keep your raycastBlock, setupControls, animate, etc. exactly as they were)
  // Just make sure to replace the updateChunks call in animate() with this fixed version

  function raycastBlock(remove) {
    // ... (your existing code)
  }

  function setupControls() {
    // ... (your existing code)
  }

  function animate() {
    requestAnimationFrame(animate);
    const dt = (Date.now() - lastTime) / 1000 || 0.016;
    lastTime = Date.now();

    const speed = 8.5 * dt;
    const forward = new THREE.Vector3(0,0,moveDir.z).applyQuaternion(camera.quaternion);
    const strafe = new THREE.Vector3(moveDir.x,0,0).applyQuaternion(camera.quaternion);
    player.position.x += (forward.x + strafe.x) * speed;
    player.position.z += (forward.z + strafe.z) * speed;

    velocity.y -= 28 * dt;
    player.position.y += velocity.y * dt;
    if (player.position.y < 6) {
      player.position.y = 6;
      velocity.y = 0;
    }

    hunger = Math.max(0, hunger - 0.7 * dt);
    document.getElementById('health').textContent = Math.floor(health);
    document.getElementById('hunger').textContent = Math.floor(hunger);

    updateChunks();
    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

  init();
</script>
