<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#000000">

  <title>HardVoxel Survival</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://via.placeholder.com/180x180/000/fff?text=HV">

  <style>
    body { margin:0; overflow:hidden; background:#000; font-family:Arial; touch-action:none; }
    canvas { display:block; }
    #ui { position:absolute; top:10px; left:10px; color:white; z-index:10; pointer-events:none; font-size:14px; }
    #crosshair { position:absolute; top:50%; left:50%; font-size:40px; transform:translate(-50%,-50%); color:rgba(255,255,255,0.8); z-index:10; pointer-events:none; }
    
    #joystickContainer { 
      position:absolute; bottom:30px; left:30px; width:130px; height:130px; 
      background:rgba(255,255,255,0.15); border:4px solid rgba(255,255,255,0.5); 
      border-radius:50%; z-index:30; touch-action:none; 
    }
    #joystickKnob { 
      position:absolute; top:50%; left:50%; width:50px; height:50px; 
      background:rgba(255,255,255,0.6); border-radius:50%; 
      transform:translate(-50%, -50%); z-index:31; 
    }
    #jump { 
      position:absolute; bottom:50px; right:40px; width:80px; height:80px; 
      background:rgba(255,255,255,0.25); border-radius:50%; display:flex; 
      align-items:center; justify-content:center; color:white; font-size:18px; 
      font-weight:bold; z-index:30; 
    }
  </style>
</head>
<body>
  <div id="ui">Health: <span id="health">100</span> | Hunger: <span id="hunger">100</span></div>
  <div id="crosshair">+</div>
  
  <div id="joystickContainer">
    <div id="joystickKnob"></div>
  </div>
  <div id="jump">JUMP</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/4.0.1/simplex-noise.min.js"></script>

  <script>
    // ... (same game code as last version - joystick + touch look + world)
    const CHUNK_SIZE = 12;
    const RENDER_DISTANCE = 2;
    let scene, camera, renderer, player;
    let velocity = new THREE.Vector3();
    let yaw = 0, pitch = 0;
    let lastTime = Date.now();
    let health = 100, hunger = 100;
    let moveDir = { x: 0, z: 0 };

    function init() {
      scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x88aaff, 20, 80);

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
      renderer = new THREE.WebGLRenderer({ antialias: false });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      scene.add(new THREE.AmbientLight(0xffffff, 0.7));
      const sun = new THREE.DirectionalLight(0xffffff, 0.8);
      sun.position.set(30, 50, 20);
      scene.add(sun);

      player = new THREE.Object3D();
      player.position.set(8, 15, 8);
      camera.position.set(0, 1.6, 0);
      player.add(camera);
      scene.add(player);

      generateSmallWorld();
      setupControls();
      animate();
    }

    function createBlock(x, y, z, color) {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshLambertMaterial({color}));
      mesh.position.set(x, y, z);
      scene.add(mesh);
    }

    function generateSmallWorld() {
      for (let x = 0; x < 28; x++) {
        for (let z = 0; z < 28; z++) {
          const height = 4 + Math.floor(Math.sin(x/5) * 2 + Math.cos(z/5) * 2);
          for (let y = 0; y < height; y++) {
            const color = (y === height-1) ? 0x22aa22 : 0x8B5A2B;
            createBlock(x, y, z, color);
          }
        }
      }
    }

    function setupControls() {
      const keys = {};
      document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
      document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

      const canvas = renderer.domElement;
      let lastX = 0, lastY = 0;

      canvas.addEventListener('touchstart', e => {
        if (e.touches.length === 1 && e.touches[0].clientX > window.innerWidth * 0.4) {
          lastX = e.touches[0].clientX;
          lastY = e.touches[0].clientY;
        }
      });

      canvas.addEventListener('touchmove', e => {
        if (e.touches.length === 1 && e.touches[0].clientX > window.innerWidth * 0.4) {
          const dx = e.touches[0].clientX - lastX;
          const dy = e.touches[0].clientY - lastY;
          yaw -= dx * 0.008;
          pitch -= dy * 0.008;
          pitch = Math.max(-1.4, Math.min(1.4, pitch));
          camera.rotation.set(pitch, yaw, 0);
          lastX = e.touches[0].clientX;
          lastY = e.touches[0].clientY;
        }
      });

      // Joystick
      const container = document.getElementById('joystickContainer');
      const knob = document.getElementById('joystickKnob');
      let joystickActive = false;
      let centerX, centerY;

      container.addEventListener('touchstart', e => {
        joystickActive = true;
        const rect = container.getBoundingClientRect();
        centerX = rect.left + rect.width / 2;
        centerY = rect.top + rect.height / 2;
        updateKnob(e.touches[0]);
      });

      document.addEventListener('touchmove', e => {
        if (!joystickActive) return;
        updateKnob(e.touches[0]);
      });

      document.addEventListener('touchend', () => {
        if (joystickActive) {
          joystickActive = false;
          knob.style.transform = 'translate(-50%, -50%)';
          moveDir = { x: 0, z: 0 };
        }
      });

      function updateKnob(touch) {
        let dx = touch.clientX - centerX;
        let dy = touch.clientY - centerY;
        const dist = Math.min(45, Math.hypot(dx, dy));
        const angle = Math.atan2(dy, dx);
        dx = Math.cos(angle) * dist;
        dy = Math.sin(angle) * dist;

        knob.style.transform = `translate(${dx-25}px, ${dy-25}px)`;
        moveDir.x = dx / 45;
        moveDir.z = dy / 45;
      }

      document.getElementById('jump').addEventListener('touchstart', () => {
        if (player.position.y < 8) velocity.y = 11;
      });
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = (Date.now() - lastTime) / 1000 || 0.016;
      lastTime = Date.now();

      const speed = 9 * dt;
      const forward = new THREE.Vector3(0, 0, moveDir.z).applyQuaternion(camera.quaternion);
      const strafe = new THREE.Vector3(moveDir.x, 0, 0).applyQuaternion(camera.quaternion);
      
      player.position.x += (forward.x + strafe.x) * speed;
      player.position.z += (forward.z + strafe.z) * speed;

      velocity.y -= 28 * dt;
      player.position.y += velocity.y * dt;
      if (player.position.y < 6) {
        player.position.y = 6;
        velocity.y = 0;
      }

      hunger = Math.max(0, hunger - 3 * dt);
      document.getElementById('health').textContent = Math.floor(health);
      document.getElementById('hunger').textContent = Math.floor(hunger);

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    init();
  </script>
</body>
</html>
